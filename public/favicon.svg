  <rect x="23" y="2"  width="18" height="14" rx="2" stroke="#111" stroke-width="2.5"/>
  <rect x="44" y="2"  width="18" height="14" rx="2" stroke="#111" stroke-width="2.5"/>

  <!-- Middle row: Rational Benefits | Positioning Statement (center, emphasized) | Emotional Benefits -->
