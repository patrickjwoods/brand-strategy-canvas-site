  <rect x="23" y="20" width="18" height="24" rx="2" stroke="#111" stroke-width="3.5" fill="#111" fill-opacity="0.08"/>
  <rect x="44" y="20" width="18" height="24" rx="2" stroke="#111" stroke-width="2.5"/>

  <!-- Bottom row: Values | Key Messages | Personality -->
  <rect x="2"  y="48" width="18" height="14" rx="2" stroke="#111" stroke-width="2.5"/>
  <rect x="23" y="48" width="18" height="14" rx="2" stroke="#111" stroke-width="2.5"/>
